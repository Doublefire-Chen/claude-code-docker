services:
  claude-code:
    build: .
    container_name: claude-code
    hostname: Mac_Studio_m4max
    ports:
      - "2222:22"
    volumes:
      - claude_home:/home/claude
      - ./authorized_keys:/home/claude/.ssh/authorized_keys:ro
    healthcheck:
      test: |
        used=$$(du -sm /home/claude | cut -f1)
        [ "$$used" -lt 10240 ] || (echo "Disk quota exceeded: $${used}MB / 10GB" && exit 1)
      interval: 60s
      timeout: 10s
      retries: 3
    restart: always

volumes:
  claude_home:
